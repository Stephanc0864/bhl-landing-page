kind = "web"
previewPath = "/"
title = "BH Labs Landing Pages"
version = "1.0.0"
id = "artifacts/landing-pages"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18929

[services.development]
run = "pnpm --filter @workspace/landing-pages run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/landing-pages", "run", "build" ]
publicDir = "artifacts/landing-pages/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18929"
BASE_PATH = "/"
